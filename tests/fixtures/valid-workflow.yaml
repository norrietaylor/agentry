identity:
  name: code-review
  version: 1.0.0
  description: Review a pull request diff for correctness and style issues.

inputs:
  diff:
    type: git-diff
    required: true
    ref: HEAD~1
    description: The git diff to review
  repo:
    type: repository-ref
    required: true
    description: The repository to review

tools:
  capabilities:
    - repository:read

model:
  provider: anthropic
  model_id: claude-sonnet-4-20250514
  temperature: 0.2
  max_tokens: 4096
  system_prompt: Review the $diff in $repo and report issues.
  retry:
    max_attempts: 3
    backoff: exponential

safety:
  resources:
    timeout: 300

output:
  schema:
    type: object
    properties:
      findings:
        type: array
  side_effects:
    - type: terminal
      description: Print summary to stdout
  output_paths:
    - findings.json
  budget:
    max_findings: 20

composition:
  steps: []
