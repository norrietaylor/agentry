identity:
  name: bug-fix
  version: 1.0.0
  description: Diagnose a reported bug, identify its root cause, and suggest a targeted fix.

inputs:
  issue-description:
    type: string
    required: true
    description: A description of the bug or unexpected behaviour to investigate.
  repository-ref:
    type: repository-ref
    required: true
    description: The repository to inspect for the root cause.

tools:
  capabilities:
    - repository:read
    - shell:execute

model:
  provider: anthropic
  model_id: claude-sonnet-4-20250514
  temperature: 0.2
  max_tokens: 4096
  system_prompt: prompts/bug-fix-system-prompt.md
  retry:
    max_attempts: 3
    backoff: exponential

safety:
  trust: elevated
  resources:
    timeout: 300

output:
  schema:
    type: object
    required:
      - diagnosis
      - root_cause
      - suggested_fix
      - confidence
    properties:
      diagnosis:
        type: string
        description: A summary of the observed symptoms and affected subsystem.
      root_cause:
        type: string
        description: The underlying cause of the bug.
      suggested_fix:
        type: object
        required:
          - file
          - line
          - change
        properties:
          file:
            type: string
            description: Path to the file that needs to be changed.
          line:
            type: integer
            description: Line number (or start line) where the fix should be applied.
          change:
            type: string
            description: Description of the code change required to fix the bug.
      confidence:
        type: number
        description: Confidence score between 0.0 (uncertain) and 1.0 (certain).
        minimum: 0.0
        maximum: 1.0
  side_effects:
    - type: terminal
      description: Print diagnosis summary to stdout
  output_paths:
    - bug-fix-result.json
  budget:
    max_findings: 1

composition:
  steps: []
