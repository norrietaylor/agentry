name: Deploy demo to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/demo/**'
      - 'docs/assets/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assemble site
        run: |
          mkdir -p _site/assets
          # Rewrite asset paths for flat site structure
          sed 's|\.\./assets/|assets/|g' docs/demo/slides.html > _site/index.html
          cp docs/assets/agentry-logo-dark.svg _site/assets/
          cp docs/assets/agentry-logo-light.svg _site/assets/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
