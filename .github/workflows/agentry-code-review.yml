# This workflow is a manually refined version of the output generated by:
#   agentry ci generate --target github --dry-run workflows/code-review.yaml
#
# Manually refined to include:
# - Proper workflow name capitalization ("Code Review" instead of "code-review")
# - Permissions for pull-request write access (pr:review and pr:comment tools)
# - Workflow-level env section with CLAUDE_CODE_OAUTH_TOKEN
# - Local installation via "pip install ." (using workspace as source)
# - Specific agentry run parameters: --input diff, --input codebase, --binder, --output-format
# - Improved formatting and readability with proper spacing

name: "Agentry: Code Review"

'on':
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  agentry:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Install agentry
        run: pip install .

      - name: Run agentry
        run: >
          agentry --output-format json run workflows/code-review.yaml
          --input diff=${{ github.event.pull_request.head.sha }}~1
          --input codebase=.
          --binder github-actions
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
